<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Portfolio</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f5f5f5;
}

.container{
    background:white;
    padding:50px;
    width:350px;
    text-align:center;
    border-radius:12px;
    box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

h1{
    font-size:32px;
    margin-bottom:25px;
    color:#111;
}

.info{
    margin-bottom:30px;
}

.label{
    font-size:13px;
    color:#777;
    letter-spacing:1px;
    margin-top:15px;
}

.value{
    font-size:20px;
    color:#111;
    font-weight:bold;
    margin-top:5px;
}

.btn{
    display:inline-block;
    width:100%;
    padding:14px;
    background:#111;
    color:white;
    text-decoration:none;
    border-radius:8px;
    font-size:15px;
    transition:0.3s;
}

.btn:hover{
    background:#333;
}
</style>
</head>

<body>

<div class="container">
    <h1>Portfolio</h1>

    <div class="info">
        <div class="label">NAME</div>
        <div class="value">Your Name Here</div>

        <div class="label">SECTION</div>
        <div class="value">Your Section Here</div>
    </div>

    <a href="portfolio.pdf" target="_blank" class="btn">
        View Portfolio
    </a>
</div>

</body>
</html>
